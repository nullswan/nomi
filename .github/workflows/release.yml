name: Release

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - os: windows
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add Perl bin to PATH
        run: echo "C:\\Strawberry\\perl\\bin" >> $Env:GITHUB_PATH
        shell: pwsh

      - name: Create pkg-config.bat in Perl bin
        run: |
          "@echo off" > C:\Strawberry\perl\bin\pkg-config.bat
          "pkg-config.exe %*" >> C:\Strawberry\perl\bin\pkg-config.bat
        shell: pwsh

      - name: Install pkg-config
        run: choco install pkgconfiglite -y
        shell: pwsh

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
        shell: pwsh

      - name: Install PortAudio via vcpkg
        run: |
          .\vcpkg\vcpkg.exe install portaudio
        shell: pwsh

      - name: Set PKG_CONFIG_PATH
        run: |
          $vcpkgPath = "${{ github.workspace }}\\vcpkg\\installed\\x64-windows\\lib\\pkgconfig"
          echo "$vcpkgPath" >> $Env:GITHUB_PATH
          echo "PKG_CONFIG_PATH=$vcpkgPath" >> $Env:GITHUB_ENV
        shell: pwsh

      - name: Verify pkg-config and PortAudio
        run: |
          where pkg-config.bat
          Test-Path "${{ env.PKG_CONFIG_PATH }}\\portaudio-2.0.pc"
        shell: pwsh

      - name: Install Dependencies
        run: bash hack/install-deps.sh

      - name: Build Binary on Windows
        shell: pwsh
        env:
          CGO_ENABLED: 1
        run: |
          $date = Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ'
          go build `
            -ldflags "-X main.buildDate=$date `
                      -X main.buildVersion=${{ github.ref_name }}" `
            -o nomi-cli.exe ./cmd/cli

      - name: Archive Binary (Windows)
        shell: pwsh
        run: Compress-Archive -Path "${{ github.workspace }}\nomi-cli.exe" -DestinationPath nomi-cli-windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomi-cli-windows
          path: nomi-cli-windows.zip

  build-others:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: ubuntu
          - os: macos
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: bash hack/install-deps.sh

      - name: Build Binary on Linux and macOS
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          go build \
            -ldflags "-X main.buildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
                      -X main.buildVersion=${{ github.ref_name }}" \
            -o nomi-cli ./cmd/cli

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomi-cli-${{ matrix.os }}
          path: nomi-cli

  release:
    needs: [build-windows, build-others]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: nomi-cli-windows
          path: artifacts/windows

      - name: Download Others Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nomi-cli-ubuntu
          path: artifacts/ubuntu

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: nomi-cli-macos
          path: artifacts/macos

      - name: Generate Release Notes
        id: notes
        run: |
          echo "## Release Notes" > release_notes.md
          git log $(git describe --tags --abbrev=0)..HEAD --pretty=format:'- %s' >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/nomi-cli-windows.zip
            artifacts/ubuntu/nomi-cli
            artifacts/macos/nomi-cli
          body_path: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
